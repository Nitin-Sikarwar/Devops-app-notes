name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-notes-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-notes-frontend

jobs:
  # ─── Test Backend ────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: devops_notes_test
          MYSQL_USER: notesuser
          MYSQL_PASSWORD: notespassword
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Run backend lint check
        run: node --check src/server.js
        working-directory: backend

  # ─── Test Frontend ───────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_API_URL: /api
          CI: false

  # ─── Build & Push Docker Images ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: echo "version=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          build-args: |
            REACT_APP_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Kubernetes ─────────────────────────────────────────────────────
  # NOTE: Enable this job when you have a Kubernetes cluster ready
  # by adding KUBE_CONFIG secret to GitHub repository secrets
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.KUBE_CONFIG != ''
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tags in manifests
        run: |
          TAG=${{ needs.build-and-push.outputs.image-tag }}
          sed -i "s|YOUR_DOCKERHUB_USERNAME/devops-notes-backend:latest|${{ secrets.DOCKERHUB_USERNAME }}/devops-notes-backend:${TAG}|g" kubernetes/base/backend.yaml
          sed -i "s|YOUR_DOCKERHUB_USERNAME/devops-notes-frontend:latest|${{ secrets.DOCKERHUB_USERNAME }}/devops-notes-frontend:${TAG}|g" kubernetes/base/frontend.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -k kubernetes/base/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n devops-notes --timeout=300s
          kubectl rollout status deployment/frontend -n devops-notes --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n devops-notes
          echo "=== Services ==="
          kubectl get services -n devops-notes
          echo "=== Ingress ==="
          kubectl get ingress -n devops-notes
